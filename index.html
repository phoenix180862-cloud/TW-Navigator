<script>
/* --- LOGIC FROM TEXT_2 --- */
const $ = id => document.getElementById(id);
const toKmh = s => (s || 0) * 3.6;
const toKn = s => (s || 0) * 1.94384;

function toDMS(d, l) {
    const a = Math.abs(d), dg = Math.floor(a), mf = (a - dg) * 60, m = Math.floor(mf), s = ((mf - m) * 60).toFixed(1);
    return `${l ? (d >= 0 ? 'N' : 'S') : (d >= 0 ? 'E' : 'W')} ${dg}° ${String(m).padStart(2, '0')}' ${s.padStart(4, '0')}"`;
}

function hTxt(d) {
    if (d == null) return '—';
    const a = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
    return a[Math.round(((d % 360 + 360) % 360) / 22.5) % 16];
}

function haversine(a1, o1, a2, o2) {
    const R = 6371, dL = (a2 - a1) * Math.PI / 180, dO = (o2 - o1) * Math.PI / 180, x = Math.sin(dL / 2) ** 2 + Math.cos(a1 * Math.PI / 180) * Math.cos(a2 * Math.PI / 180) * Math.sin(dO / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

/* EMA SMOOTHER */
const sm = {
    speed: null, heading: null, altitude: null, lat: null, lon: null, lastLat: null, lastLon: null, lastT: null,
    upd(r) {
        let rawSpd = r.speed;
        if ((rawSpd == null || rawSpd === 0) && this.lastLat != null) {
            const now = Date.now(), dt = (now - this.lastT) / 1000;
            if (dt > 0 && dt < 10) {
                const d = haversine(this.lastLat, this.lastLon, r.latitude, r.longitude) * 1000;
                rawSpd = d / dt;
            }
        }
        this.lastLat = r.latitude; this.lastLon = r.longitude; this.lastT = Date.now();
        const rs = rawSpd < 0.15 ? 0 : rawSpd;
        if (this.speed === null) this.speed = rs; else this.speed += 0.25 * (rs - this.speed);
        if (r.altitude != null) { if (this.altitude === null) this.altitude = r.altitude; else this.altitude += 0.3 * (r.altitude - this.altitude) }
        if (r.heading != null && rs >= 0.4) {
            if (this.heading === null) this.heading = r.heading;
            else { let d = r.heading - this.heading; if (d > 180) d -= 360; if (d < -180) d += 360; this.heading = ((this.heading + 0.2 * d) % 360 + 360) % 360 }
        }
        if (this.lat === null) { this.lat = r.latitude; this.lon = r.longitude } else { this.lat += 0.4 * (r.latitude - this.lat); this.lon += 0.4 * (r.longitude - this.lon) }
        return { latitude: this.lat, longitude: this.lon, speed: this.speed, heading: this.heading, altitude: this.altitude, accuracy: r.accuracy };
    },
    rst() { this.speed = null; this.heading = null; this.altitude = null; this.lat = null; this.lon = null; this.lastLat = null; this.lastLon = null; this.lastT = null }
};

/* STATE */
let mode = 'live', gps = null, mxS = 0, totalDist = 0, prevLat = null, prevLon = null, recording = false, aS = null;
let leafMap = null, leafMarker = null, mapPF = false, mapPT = null, wId = null, dIv = null, dT = 0;
const TK = 'twn_trips', AK = 'twn_active';

/* TAB SWITCHING */
function switchTab(tab) {
    ['Cockpit', 'Map', 'Journal'].forEach(t => {
        $(`panel${t}`).classList.toggle('active', t === tab);
        const nav = $(`nav${t}`);
        if (t === tab) {
            nav.classList.add('text-cyan-400', 'bg-cyan-400/10', 'rounded-2xl', 'px-6', 'border-t-2', 'border-cyan-400');
            nav.classList.remove('text-slate-500', 'opacity-60');
        } else {
            nav.classList.remove('text-cyan-400', 'bg-cyan-400/10', 'rounded-2xl', 'px-6', 'border-t-2', 'border-cyan-400');
            nav.classList.add('text-slate-500', 'opacity-60');
        }
    });
    if (tab === 'Map' && leafMap) {
        setTimeout(() => leafMap.invalidateSize(), 100);
        if (gps) leafMap.panTo([gps.latitude, gps.longitude]);
    }
}

/* SESSION LOGIC */
function ldT() { try { return JSON.parse(localStorage.getItem(TK)) || [] } catch (e) { return [] } }
function svT(t) { localStorage.setItem(TK, JSON.stringify(t)) }
function startSess() { aS = { id: Date.now(), st: new Date().toISOString(), km: 0, mx: 0 }; svA() }
function svA() { if (aS) localStorage.setItem(AK, JSON.stringify(aS)) }
function endSess() {
    if (!aS) return;
    aS.et = new Date().toISOString(); aS.km = totalDist; aS.mx = mxS;
    if (aS.km > 0.005) { const t = ldT(); t.unshift(aS); if (t.length > 50) t.length = 50; svT(t) }
    aS = null; localStorage.removeItem(AK); renderLog();
}

function toggleRec() {
    recording = !recording;
    const btn = $('recToggleButton');
    const dot = $('recDot');
    const label = $('recStatusLabel');
    if (recording) {
        btn.textContent = 'Stop';
        btn.classList.replace('bg-red-500/20', 'bg-red-500');
        btn.classList.replace('text-red-500', 'text-white');
        dot.classList.replace('bg-slate-500', 'bg-secondary');
        dot.classList.add('animate-pulse');
        label.textContent = 'Log Aktiv';
        startSess();
    } else {
        btn.textContent = 'Start';
        btn.classList.replace('bg-red-500', 'bg-red-500/20');
        btn.classList.replace('text-white', 'text-red-500');
        dot.classList.replace('bg-secondary', 'bg-slate-500');
        dot.classList.remove('animate-pulse');
        label.textContent = 'Log Inaktiv';
        endSess();
    }
}

function renderLog() {
    const el = $('tripLog');
    const trips = ldT();
    if (!trips.length) { el.innerHTML = '<div class="text-center py-8 text-on-surface-variant text-xs italic">Keine Einträge vorhanden</div>'; return; }
    el.innerHTML = trips.map(t => {
        const d = new Date(t.st).toLocaleDateString('de-DE');
        return `
        <div class="px-4 py-2 flex justify-between items-center hover:bg-white/5 transition-colors group">
            <div onclick="openEdit(${t.id})" class="cursor-pointer">
                <div class="text-[10px] font-mono text-on-surface">${d}</div>
                <div class="text-[9px] font-mono text-on-surface-variant">${t.km.toFixed(2)} km Fahrt</div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div class="text-[10px] font-headline font-bold text-primary">${(t.km * 0.539957).toFixed(2)} nm</div>
                    <div class="text-[10px] font-headline font-bold text-secondary">${(t.mx * 3.6).toFixed(1)} km/h</div>
                </div>
                <button onclick="delTrip(${t.id})" class="text-red-400 opacity-0 group-hover:opacity-100 p-1">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            </div>
        </div>`;
    }).join('');
}

window.delTrip = function(id) { svT(ldT().filter(t => t.id !== id)); renderLog() };
window.clearAllTrips = function() { if (confirm('Alle Fahrten löschen?')) { svT([]); renderLog() } };

/* EDIT TRIP */
window.openEdit = function(id) {
    const trips = ldT(); const t = trips.find(x => x.id === id); if (!t) return;
    $('edKm').value = t.km.toFixed(3); $('edMx').value = (t.mx * 3.6).toFixed(1);
    $('edId').value = id; $('editModal').classList.add('open');
};
window.closeEdit = function() { $('editModal').classList.remove('open') };
window.saveEdit = function() {
    const id = parseInt($('edId').value); const trips = ldT(); const t = trips.find(x => x.id === id);
    if (t) { t.km = parseFloat($('edKm').value) || 0; t.mx = (parseFloat($('edMx').value) || 0) / 3.6; svT(trips); renderLog() }
    closeEdit();
};

/* UPDATE DISPLAY */
function upd(c) {
    $('vSpd').textContent = toKn(c.speed).toFixed(1);
    $('vHdg').textContent = c.heading != null ? Math.round(c.heading) + '°' : '—';
    $('vDir').textContent = hTxt(c.heading);
    $('vAlt').textContent = c.altitude != null ? Math.round(c.altitude) : '—';
    $('vLat').textContent = toDMS(c.latitude, true);
    $('vLon').textContent = toDMS(c.longitude, false);
    $('vDnm').textContent = (totalDist * 0.539957).toFixed(3);
    $('vDkmTotal').textContent = totalDist.toFixed(3) + ' km Total';
    
    if (c.accuracy != null) {
        const dot = $('wlDot');
        dot.classList.toggle('bg-green-500', c.accuracy < 20);
        dot.classList.toggle('bg-yellow-500', c.accuracy >= 20 && c.accuracy < 50);
        dot.classList.toggle('bg-red-500', c.accuracy >= 50);
        $('stT').textContent = `Acc: ±${Math.round(c.accuracy)}m`;
    }
    
    if (leafMarker) leafMarker.setLatLng([c.latitude, c.longitude]);
    if (leafMap && !mapPF) leafMap.panTo([c.latitude, c.longitude]);
}

/* PROCESS GPS */
function proc(raw) {
    const c = mode === 'live' ? sm.upd(raw) : { latitude: raw.latitude, longitude: raw.longitude, speed: raw.speed, heading: raw.heading, altitude: raw.altitude, accuracy: raw.accuracy };
    gps = c;
    if (recording) {
        if (c.speed > mxS) mxS = c.speed;
        if (prevLat != null) {
            const d = haversine(prevLat, prevLon, c.latitude, c.longitude);
            if (d > 0.002 && d < 0.2) totalDist += d;
        }
    }
    prevLat = c.latitude; prevLon = c.longitude;
    if (!leafMap) initMap(c.latitude, c.longitude);
    upd(c);
}

/* MAP */
function initMap(lat, lon) {
    leafMap = L.map('mapDiv', { zoomControl: false, attributionControl: false }).setView([lat, lon], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafMap);
    leafMarker = L.circleMarker([lat, lon], { radius: 8, color: '#00daf3', fillColor: '#00daf3', fillOpacity: 0.8, weight: 2 }).addTo(leafMap);
    leafMap.on('mousedown touchstart', () => { mapPF = true; clearTimeout(mapPT); mapPT = setTimeout(() => mapPF = false, 15000) });
}
function recenterMap() { mapPF = false; if (gps) leafMap.panTo([gps.latitude, gps.longitude]) }

/* MENU & MODES */
function toggleModeMenu() { $('modeMenu').classList.toggle('hidden') }
function dGps(t) { const b = t * 0.02; return { latitude: 51.5074 + Math.sin(b * 0.7) * 0.005, longitude: -0.1278 + Math.cos(b * 0.5) * 0.005, speed: Math.abs(6 + Math.sin(b) * 4), heading: (b * 50) % 360, altitude: 142 + Math.sin(b * 0.4) * 10, accuracy: 5 } }

function swM(m) {
    if (m === mode) return;
    if (wId) navigator.geolocation.clearWatch(wId);
    if (dIv) clearInterval(dIv);
    mode = m;
    $('bL').classList.toggle('bg-primary/10', m === 'live');
    $('bL').classList.toggle('text-primary', m === 'live');
    $('bL').classList.toggle('border-primary/40', m === 'live');
    $('bD').classList.toggle('bg-primary/10', m === 'demo');
    $('bD').classList.toggle('text-primary', m === 'demo');
    $('bD').classList.toggle('border-primary/40', m === 'demo');
    $('demoBadge').classList.toggle('hidden', m !== 'demo');
    
    if (m === 'live') {
        wId = navigator.geolocation.watchPosition(p => proc(p.coords), null, { enableHighAccuracy: true });
    } else {
        dT = 0; dIv = setInterval(() => { dT++; proc(dGps(dT)) }, 1000);
    }
    toggleModeMenu();
}

function resetInstruments() { if (confirm('Alle Statistiken zurücksetzen?')) { mxS = 0; totalDist = 0; upd(gps); } toggleModeMenu(); }
function copyCoords() {
    if (!gps) return;
    const t = `${gps.latitude.toFixed(6)}, ${gps.longitude.toFixed(6)}`;
    navigator.clipboard.writeText(t).then(() => {
        const toast = $('copyToast'); toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    });
}

/* INIT */
window.onload = () => {
    renderLog();
    swM('live');
};
</script>
