<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A1628">
<title>TW Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A1628;
  --bg2: #060E1A;
  --card: rgba(15, 25, 50, 0.75);
  --gold: #C9A84C;
  --gold-dim: rgba(201,168,76,0.25);
  --gold-glow: rgba(201,168,76,0.12);
  --cyan: #00D4FF;
  --cyan-dim: rgba(0,212,255,0.15);
  --white: #E8ECF1;
  --dim: rgba(232,236,241,0.45);
  --red: #FF4D4D;
  --green: #34D399;
  --yellow: #FBBF24;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --sans: 'Outfit', -apple-system, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  color:var(--white);
  min-height:100vh;min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}
#app{max-width:430px;margin:0 auto;padding:0 14px 88px;position:relative;z-index:1}

.header{text-align:center;padding:20px 0 6px}
.header .title{margin-top:8px;font-size:19px;font-weight:700;color:var(--gold);letter-spacing:3.5px;text-transform:uppercase}
.header .sub{font-size:10px;color:var(--dim);letter-spacing:2.5px;margin-top:3px}

/* Mode toggle */
.mode-bar{display:flex;justify-content:center;margin:10px 0 6px;gap:0}
.mode-btn{
  font-family:var(--sans);font-size:11px;font-weight:600;
  padding:7px 18px;border:1px solid var(--gold-dim);
  background:transparent;color:var(--dim);cursor:pointer;
  letter-spacing:1px;transition:all 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.mode-btn:first-child{border-radius:20px 0 0 20px}
.mode-btn:last-child{border-radius:0 20px 20px 0}
.mode-btn.active{background:rgba(201,168,76,0.15);color:var(--gold);border-color:var(--gold)}

.card{
  background:var(--card);border:1px solid var(--gold-dim);border-radius:18px;
  padding:16px 18px;margin-bottom:14px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 4px 30px rgba(0,0,0,0.45),inset 0 1px 0 var(--gold-glow);
}
.card-label{display:flex;align-items:center;gap:7px;margin-bottom:12px;font-size:11px;font-weight:600;color:var(--gold);letter-spacing:2.2px;text-transform:uppercase}

.mono{font-family:var(--mono)}.big-num{font-size:28px;font-weight:700;line-height:1.2}
.med-num{font-size:17px;font-weight:700;line-height:1.6}.sm-num{font-size:11px;color:var(--dim)}
.unit{font-size:14px;color:var(--dim);margin-left:4px;font-weight:400}

.row{display:flex;align-items:center}.center{justify-content:center;align-items:center}
.gap16{gap:16px}.gap24{gap:24px}.mt8{margin-top:8px}.mt10{margin-top:10px}

.stat-box{text-align:center}.stat-label{font-size:10px;color:var(--dim);margin-bottom:2px}
.stat-val{font-family:var(--mono);font-size:15px;font-weight:700}
.stat-val.cyan{color:var(--cyan)}.stat-val.gold{color:var(--gold)}

.spark-label{font-size:9px;color:var(--dim);margin-bottom:3px}

.copy-toast{position:absolute;top:0;right:0;font-size:10px;color:var(--green);font-weight:600;opacity:0;transition:opacity 0.3s}
.copy-toast.show{opacity:1}
.pos-data{cursor:pointer;position:relative;-webkit-tap-highlight-color:transparent}

.status-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,22,40,0.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--gold-dim);padding:9px 18px;
  display:flex;justify-content:space-between;align-items:center;
  max-width:430px;margin:0 auto;z-index:10;
  padding-bottom:max(9px,env(safe-area-inset-bottom));
}
.accuracy-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.status-text{font-size:10px;color:var(--dim)}

.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;gap:22px}
.loader-msg{color:var(--gold);font-size:15px;letter-spacing:1px;text-align:center}
.loader-hint{color:var(--dim);font-size:11px;max-width:280px;text-align:center;line-height:1.7}

/* Demo badge */
.demo-badge{
  display:inline-block;background:rgba(251,191,36,0.15);color:var(--yellow);
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:3px 10px;border-radius:10px;border:1px solid rgba(251,191,36,0.3);
  margin-left:8px;vertical-align:middle;
}

/* Help card */
.help-card{
  background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);
  border-radius:14px;padding:14px 16px;margin:10px 0 14px;
}
.help-card h3{font-size:13px;color:var(--cyan);margin-bottom:8px;font-weight:600}
.help-card p,.help-card li{font-size:11px;color:var(--dim);line-height:1.7}
.help-card ol{padding-left:18px;margin:6px 0}
.help-card li{margin-bottom:4px}
.help-card a{color:var(--cyan);text-decoration:underline}
.help-card .retry-btn{
  display:inline-block;margin-top:10px;padding:8px 20px;
  background:rgba(0,212,255,0.12);border:1px solid rgba(0,212,255,0.3);
  border-radius:10px;color:var(--cyan);font-size:12px;font-weight:600;
  cursor:pointer;font-family:var(--sans);-webkit-tap-highlight-color:transparent;
}

@keyframes pulse{0%,100%{r:3;opacity:1}50%{r:6;opacity:0.3}}
.pulse-dot{animation:pulse 2s ease-in-out infinite}
@keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.radar-sweep{animation:sweep 2s linear infinite;transform-origin:60px 60px}
.compass-ring{transition:transform 0.5s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.5s ease-out both}
.card:nth-child(2){animation-delay:0.06s}
.card:nth-child(3){animation-delay:0.12s}
.card:nth-child(4){animation-delay:0.18s}
.card:nth-child(5){animation-delay:0.24s}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// TW NAVIGATOR v2 – Standalone + Demo Mode
// ═══════════════════════════════════════════════════════════════

const HIST = 60;
const app = document.getElementById('app');

// ── State ──
let mode = 'live'; // 'live' or 'demo'
let gps = null;
let gpsError = null;
let lastUpdate = null;
let speedHistory = [];
let altHistory = [];
let maxSpd = 0;
let spdSum = 0;
let spdCount = 0;
let smoothHeading = 0;
let watchId = null;
let demoInterval = null;
let demoTime = 0;
let gpsPermissionDenied = false;
let gpsAttempted = false;

// ── Helpers ──
const toKmh = s => (s||0)*3.6;
const toKn = s => (s||0)*1.94384;
const toFt = m => (m||0)*3.28084;
const clamp = (v,lo,hi) => Math.min(Math.max(v,lo),hi);

function toDMS(dec,isLat){
  const a=Math.abs(dec),d=Math.floor(a),mf=(a-d)*60,m=Math.floor(mf),s=((mf-m)*60).toFixed(1);
  const dir=isLat?(dec>=0?'N':'S'):(dec>=0?'E':'W');
  return `${dir} ${d}° ${String(m).padStart(2,'0')}' ${s.padStart(4,'0')}"`;
}
function headingText(deg){
  if(deg==null)return'—';
  const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return d[Math.round(((deg%360+360)%360)/22.5)%16];
}
function shortRot(from,to){return from+((to-from+540)%360)-180;}

// ── Demo GPS Simulation ──
function getDemoGps(t) {
  // Simulate a scenic drive around a coastal route
  const baseT = t * 0.02;
  const lat = 50.705 + Math.sin(baseT * 0.7) * 0.008 + Math.cos(baseT * 0.3) * 0.004;
  const lon = 7.895 + Math.cos(baseT * 0.5) * 0.012 + Math.sin(baseT * 0.8) * 0.003;
  const speed = Math.max(0, 6 + Math.sin(baseT * 1.2) * 4 + Math.cos(baseT * 2.5) * 2.5 + Math.sin(baseT * 0.3) * 3);
  const heading = (((baseT * 40) + Math.sin(baseT * 0.8) * 60 + Math.cos(baseT * 1.5) * 30) % 360 + 360) % 360;
  const altitude = 180 + Math.sin(baseT * 0.4) * 80 + Math.cos(baseT * 0.9) * 40;
  return {
    latitude: lat,
    longitude: lon,
    speed: speed / 3.6, // convert km/h to m/s
    heading: heading,
    altitude: altitude,
    accuracy: 3 + Math.random() * 2,
  };
}

// ── SVG Builders ──

function svgIcon(){
  let ticks='';
  for(let i=0;i<36;i++){const a=i*10*Math.PI/180,mj=i%9===0,r1=mj?36:39;
    ticks+=`<line x1="${50+r1*Math.sin(a)}" y1="${50-r1*Math.cos(a)}" x2="${50+42*Math.sin(a)}" y2="${50-42*Math.cos(a)}" stroke="#C9A84C" stroke-width="${mj?1.5:0.5}" opacity="${mj?1:0.4}"/>`;}
  let cl='';
  [['N',0,'#FF4D4D'],['E',90,'#C9A84C'],['S',180,'#C9A84C'],['W',270,'#C9A84C']].forEach(([l,d,c])=>{
    const a=d*Math.PI/180;cl+=`<text x="${50+32*Math.sin(a)}" y="${50-32*Math.cos(a)}" text-anchor="middle" dominant-baseline="central" fill="${c}" font-size="7" font-weight="700" font-family="sans-serif">${l}</text>`;});
  return`<svg width="74" height="74" viewBox="0 0 100 100" style="filter:drop-shadow(0 0 14px rgba(201,168,76,0.45))">
    <defs><radialGradient id="iBg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#162240"/><stop offset="100%" stop-color="#0A1628"/></radialGradient>
    <linearGradient id="iG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0C060"/><stop offset="100%" stop-color="#A08030"/></linearGradient></defs>
    <circle cx="50" cy="50" r="48" fill="url(#iBg)" stroke="url(#iG)" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(201,168,76,0.25)" stroke-width="0.5"/>
    ${ticks}${cl}
    <polygon points="50,14 46,26 54,26" fill="#FF4D4D" opacity="0.9"><animateTransform attributeName="transform" type="rotate" values="0 50 50;360 50 50" dur="60s" repeatCount="indefinite"/></polygon>
    <text x="50" y="53" text-anchor="middle" dominant-baseline="central" fill="#C9A84C" font-size="16" font-weight="800" font-family="Georgia,serif" letter-spacing="1">TW</text></svg>`;
}

function svgSparkline(data,color,id,h=40){
  if(!data||data.length<2)return'';
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1,w=200;
  const pts=data.map((v,i)=>{const x=(i/(data.length-1))*w,y=h-((v-mn)/rng)*(h-4)-2;return`${x},${y}`;});
  const last=data[data.length-1],ly=h-((last-mn)/rng)*(h-4)-2;
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block">
    <defs><linearGradient id="sg${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="M0,${h} L${pts.join(' L')} L${w},${h} Z" fill="url(#sg${id})"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="${w}" cy="${ly}" r="2.5" fill="${color}" class="pulse-dot"/></svg>`;
}

function svgPosGrid(lat,lon){
  const mx=((lon+180)/360)*160,my=((90-lat)/180)*120;
  let l='';for(let i=0;i<7;i++)l+=`<line x1="0" y1="${i*20}" x2="160" y2="${i*20}" stroke="rgba(201,168,76,0.07)" stroke-width="0.5"/>`;
  for(let i=0;i<9;i++)l+=`<line x1="${i*20}" y1="0" x2="${i*20}" y2="120" stroke="rgba(201,168,76,0.07)" stroke-width="0.5"/>`;
  return`<svg viewBox="0 0 160 120" style="width:100%;max-width:240px;display:block;margin:0 auto">${l}
    <line x1="${mx-14}" y1="${my}" x2="${mx+14}" y2="${my}" stroke="var(--cyan)" stroke-width="0.6" opacity="0.5"/>
    <line x1="${mx}" y1="${my-14}" x2="${mx}" y2="${my+14}" stroke="var(--cyan)" stroke-width="0.6" opacity="0.5"/>
    <circle cx="${mx}" cy="${my}" r="13" fill="none" stroke="var(--cyan)" stroke-width="0.5" opacity="0.25"/>
    <circle cx="${mx}" cy="${my}" r="3" fill="var(--cyan)" class="pulse-dot"/><circle cx="${mx}" cy="${my}" r="2" fill="var(--white)"/>
    <text x="${mx+9}" y="${my-9}" fill="var(--cyan)" font-size="7" font-family="var(--mono)" opacity="0.65">${lat.toFixed(2)}°</text></svg>`;
}

function svgSpeedGauge(speed,maxS=60){
  const pct=clamp(speed/maxS,0,1),sA=-135,eA=135,sw=sA+pct*(eA-sA),r=70,cx=90,cy=90;
  const p2c=(a,rd)=>({x:cx+rd*Math.cos((a-90)*Math.PI/180),y:cy+rd*Math.sin((a-90)*Math.PI/180)});
  const arc=(f,t,rd)=>{const s=p2c(f,rd),e=p2c(t,rd),lg=t-f>180?1:0;return`M ${s.x} ${s.y} A ${rd} ${rd} 0 ${lg} 1 ${e.x} ${e.y}`;};
  const tip=p2c(sw,r-10),nA=sw-90;
  const b1={x:cx+3*Math.cos((nA+90)*Math.PI/180),y:cy+3*Math.sin((nA+90)*Math.PI/180)};
  const b2={x:cx+3*Math.cos((nA-90)*Math.PI/180),y:cy+3*Math.sin((nA-90)*Math.PI/180)};
  let tk='';for(let i=0;i<=12;i++){const a=sA+(i/12)*(eA-sA),inn=p2c(a,r+8),out=p2c(a,r+14),lb=p2c(a,r+23),v=Math.round((i/12)*maxS);
    tk+=`<line x1="${inn.x}" y1="${inn.y}" x2="${out.x}" y2="${out.y}" stroke="var(--dim)" stroke-width="${i%3===0?1.5:0.5}"/>`;
    if(i%3===0)tk+=`<text x="${lb.x}" y="${lb.y}" text-anchor="middle" dominant-baseline="central" fill="var(--dim)" font-size="7" font-family="var(--mono)">${v}</text>`;}
  const aa=pct>0.005?`<path d="${arc(sA,sw,r)}" fill="none" stroke="var(--cyan)" stroke-width="14" stroke-linecap="round" style="filter:drop-shadow(0 0 7px var(--cyan))"/>`:'';
  return`<svg viewBox="0 0 180 130" style="width:100%;max-width:270px;display:block;margin:0 auto">
    <path d="${arc(sA,eA,r)}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="14" stroke-linecap="round"/>
    <path d="${arc(sA,sA+90,r)}" fill="none" stroke="var(--green)" stroke-width="14" stroke-linecap="round" opacity="0.12"/>
    <path d="${arc(sA+90,sA+180,r)}" fill="none" stroke="var(--yellow)" stroke-width="14" stroke-linecap="round" opacity="0.12"/>
    <path d="${arc(sA+180,eA,r)}" fill="none" stroke="var(--red)" stroke-width="14" stroke-linecap="round" opacity="0.12"/>
    ${aa}${tk}
    <polygon points="${tip.x},${tip.y} ${b1.x},${b1.y} ${b2.x},${b2.y}" fill="var(--gold)" style="filter:drop-shadow(0 0 4px var(--gold))"/>
    <circle cx="${cx}" cy="${cy}" r="5" fill="var(--bg)" stroke="var(--gold)" stroke-width="1.5"/>
    <text x="${cx}" y="${cy+28}" text-anchor="middle" fill="var(--white)" font-size="21" font-weight="700" font-family="var(--mono)">${speed.toFixed(1)}</text>
    <text x="${cx}" y="${cy+41}" text-anchor="middle" fill="var(--dim)" font-size="8" font-family="var(--sans)">km/h</text></svg>`;
}

function svgAltGauge(alt,maxA=2000){
  const pct=clamp((alt||0)/maxA,0,1),bH=120,fH=pct*bH;
  let lb='';[0,500,1000,1500,2000].forEach(v=>{const y=10+bH-(v/maxA)*bH;
    lb+=`<line x1="46" y1="${y}" x2="50" y2="${y}" stroke="var(--dim)" stroke-width="0.5"/><text x="54" y="${y}" dominant-baseline="central" fill="var(--dim)" font-size="6" font-family="var(--mono)">${v}</text>`;});
  return`<svg viewBox="0 0 60 140" style="height:130px">
    <defs><linearGradient id="aG" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1E40AF"/><stop offset="40%" stop-color="#059669"/><stop offset="80%" stop-color="#92400E"/><stop offset="100%" stop-color="#78350F"/></linearGradient>
    <clipPath id="aC"><rect x="15" y="${10+bH-fH}" width="30" height="${fH}" rx="4"/></clipPath></defs>
    <rect x="15" y="10" width="30" height="${bH}" rx="6" fill="rgba(255,255,255,0.04)" stroke="var(--gold-dim)" stroke-width="0.5"/>
    <rect x="15" y="10" width="30" height="${bH}" rx="6" fill="url(#aG)" clip-path="url(#aC)"/>${lb}
    <text x="30" y="138" text-anchor="middle" fill="var(--dim)" font-size="7">m</text></svg>`;
}

function svgCompass(heading){
  const h=heading??0;
  let tk='';for(let i=0;i<72;i++){const a=i*5*Math.PI/180,mj=i%18===0,md=i%9===0,r1=mj?72:md?75:78;
    tk+=`<line x1="${100+r1*Math.sin(a)}" y1="${100-r1*Math.cos(a)}" x2="${100+80*Math.sin(a)}" y2="${100-80*Math.cos(a)}" stroke="${mj?'var(--gold)':'var(--dim)'}" stroke-width="${mj?1.5:0.4}"/>`;}
  let cd='';[['N',0,'var(--red)'],['E',90,'var(--gold)'],['S',180,'var(--gold)'],['W',270,'var(--gold)']].forEach(([l,d,c])=>{
    const a=d*Math.PI/180;cd+=`<text x="${100+64*Math.sin(a)}" y="${100-64*Math.cos(a)}" text-anchor="middle" dominant-baseline="central" fill="${c}" font-size="13" font-weight="800" font-family="var(--sans)">${l}</text>`;});
  let ic='';[['NE',45],['SE',135],['SW',225],['NW',315]].forEach(([l,d])=>{
    const a=d*Math.PI/180;ic+=`<text x="${100+64*Math.sin(a)}" y="${100-64*Math.cos(a)}" text-anchor="middle" dominant-baseline="central" fill="var(--dim)" font-size="8" font-family="var(--sans)">${l}</text>`;});
  return`<svg viewBox="0 0 200 200" style="width:100%;max-width:230px;display:block;margin:0 auto">
    <circle cx="100" cy="100" r="92" fill="none" stroke="var(--gold-dim)" stroke-width="1"/>
    <circle cx="100" cy="100" r="80" fill="rgba(10,22,40,0.6)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <g class="compass-ring" style="transform:rotate(${-h}deg);transform-origin:100px 100px">${tk}${cd}${ic}
      <polygon points="100,10 96,20 104,20" fill="var(--red)"/></g>
    <polygon points="100,12 96,4 104,4" fill="var(--cyan)" style="filter:drop-shadow(0 0 5px var(--cyan))"/>
    <circle cx="100" cy="100" r="3" fill="var(--gold)"/>
    <text x="100" y="92" text-anchor="middle" dominant-baseline="central" fill="var(--white)" font-size="23" font-weight="700" font-family="var(--mono)">${heading!=null?Math.round(heading)+'°':'—'}</text>
    <text x="100" y="112" text-anchor="middle" dominant-baseline="central" fill="var(--cyan)" font-size="12" font-weight="600" font-family="var(--sans)">${heading!=null?headingText(heading):'Kein Kurs'}</text></svg>`;
}

function svgRadar(msg){
  return`<div class="loader-wrap">
    <svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="50" fill="none" stroke="var(--gold-dim)" stroke-width="1"/>
      <circle cx="60" cy="60" r="35" fill="none" stroke="var(--gold-dim)" stroke-width="0.5"/>
      <circle cx="60" cy="60" r="20" fill="none" stroke="var(--gold-dim)" stroke-width="0.5"/>
      <circle cx="60" cy="60" r="2" fill="var(--gold)"/>
      <g class="radar-sweep"><line x1="60" y1="60" x2="60" y2="10" stroke="var(--cyan)" stroke-width="1.5" opacity="0.8"/>
        <path d="M60,60 L60,10 A50,50 0 0,1 95,25 Z" fill="var(--cyan-dim)" opacity="0.35"/></g>
    </svg>
    <div class="loader-msg">${msg}</div>
    <div class="loader-hint">Tippe auf <b>DEMO</b> oben um die App mit simulierten GPS-Daten zu testen.</div>
  </div>`;
}

// ── Render ──

function render(){
  const isDemo = mode === 'demo';
  const data = gps;

  let html = `<div class="header">${svgIcon()}
    <div class="title">TW Navigator${isDemo?'<span class="demo-badge">Demo</span>':''}</div>
    <div class="sub">Maritime Precision Instruments</div></div>`;

  // Mode toggle
  html += `<div class="mode-bar">
    <button class="mode-btn ${mode==='live'?'active':''}" onclick="switchMode('live')">📡 LIVE GPS</button>
    <button class="mode-btn ${mode==='demo'?'active':''}" onclick="switchMode('demo')">🎮 DEMO</button>
  </div>`;

  if(!data){
    // No data yet
    if(gpsPermissionDenied){
      html += `<div class="help-card">
        <h3>📡 GPS-Zugriff blockiert</h3>
        <p>Der Browser hat den Standortzugriff verweigert. So behebst du das:</p>
        <ol>
          <li>Tippe auf das <b>🔒 Schloss-Symbol</b> in der Adressleiste</li>
          <li>Wähle <b>Berechtigungen</b> → <b>Standort</b> → <b>Zulassen</b></li>
          <li>Lade die Seite neu</li>
        </ol>
        <p style="margin-top:8px"><b>Tipp:</b> Lokale HTML-Dateien (file://) unterstützen oft kein GPS. Lade die Datei auf Google Drive hoch und öffne sie von dort, oder nutze den Demo-Modus!</p>
        <button class="retry-btn" onclick="retryGps()">🔄 Erneut versuchen</button>
      </div>`;
    } else if(gpsError){
      html += svgRadar(gpsError);
    } else {
      html += svgRadar('GPS-Signal wird gesucht…');
    }
    html += buildStatusBar();
    app.innerHTML = html;
    return;
  }

  const c = data;
  const spd = toKmh(c.speed);
  const kn = toKn(c.speed);
  const alt = c.altitude;
  const hdg = c.heading;
  const avgSpd = spdCount>0 ? spdSum/spdCount : 0;

  // Position
  html += `<div class="card"><div class="card-label"><span>📍</span> Position</div>
    <div class="pos-data" id="posData">
      <div class="mono med-num">${toDMS(c.latitude,true)}</div>
      <div class="mono med-num">${toDMS(c.longitude,false)}</div>
      <div class="mono sm-num" style="margin-top:3px">${c.latitude.toFixed(6)}° / ${c.longitude.toFixed(6)}°</div>
      <div class="copy-toast" id="copyToast">✓ Kopiert</div>
    </div>
    <div class="mt10">${svgPosGrid(c.latitude,c.longitude)}</div></div>`;

  // Speed
  html += `<div class="card"><div class="card-label"><span>🚀</span> Geschwindigkeit</div>
    ${svgSpeedGauge(spd)}
    <div class="row center gap24 mt8">
      <div class="stat-box"><div class="stat-label">Knoten</div><div class="stat-val cyan">${kn.toFixed(1)} kn</div></div>
      <div class="stat-box"><div class="stat-label">Max</div><div class="stat-val gold">${maxSpd.toFixed(1)} km/h</div></div>
      <div class="stat-box"><div class="stat-label">Ø</div><div class="stat-val">${avgSpd.toFixed(1)} km/h</div></div>
    </div>
    <div class="mt10"><div class="spark-label">Geschwindigkeit (60s)</div>${svgSparkline(speedHistory,'#00D4FF','spd')}</div></div>`;

  // Altitude
  html += `<div class="card"><div class="card-label"><span>📐</span> Höhe</div>
    <div class="row gap16" style="align-items:center">
      ${svgAltGauge(alt)}
      <div><div class="mono big-num">${alt!=null?Math.round(alt):'—'}<span class="unit">m ü. NHN</span></div>
        <div class="mono sm-num" style="margin-top:5px">(${alt!=null?Math.round(toFt(alt)):'—'} ft)</div></div>
    </div>
    <div class="mt10"><div class="spark-label">Höhenverlauf (60s)</div>${svgSparkline(altHistory,'#34D399','alt')}</div></div>`;

  // Compass
  html += `<div class="card"><div class="card-label"><span>🧭</span> Kurs / Heading</div>
    ${svgCompass(hdg!=null?smoothHeading:null)}
    <div style="text-align:center;margin-top:8px">
      <div class="mono big-num">${hdg!=null?Math.round(hdg)+'°':'—'}</div>
      <div style="font-size:16px;font-weight:600;color:var(--cyan);margin-top:2px">${hdg!=null?headingText(hdg):'Kein Kurs'}</div>
    </div></div>`;

  html += buildStatusBar();
  app.innerHTML = html;

  // Attach copy handler
  const posEl = document.getElementById('posData');
  if(posEl){posEl.onclick=()=>{
    const txt=`${c.latitude.toFixed(6)}, ${c.longitude.toFixed(6)}`;
    if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>{
      const t=document.getElementById('copyToast');if(t){t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
    }).catch(()=>{});}
  };}
}

function buildStatusBar(){
  let acc='';
  if(gps&&gps.accuracy!=null){
    const a=gps.accuracy,good=a<10,ok=a<30;
    const col=good?'var(--green)':ok?'var(--yellow)':'var(--red)';
    const lbl=good?'Exzellent':ok?'Gut':'Niedrig';
    acc=`<span class="accuracy-dot" style="background:${col};box-shadow:0 0 6px ${col}"></span><span style="font-size:10px;color:${col}">±${Math.round(a)}m · ${lbl}</span>`;
  }
  const src = mode==='demo'?'<span style="color:var(--yellow)">🎮 Demo-Modus</span>':'';
  const time=lastUpdate?`${lastUpdate.toLocaleTimeString('de-DE')}`:'Warte…';
  return`<div class="status-bar"><div>${acc||src}</div><div class="status-text">${time}</div></div>`;
}

// ── GPS + Demo Control ──

function processPosition(c){
  gps = c;
  lastUpdate = new Date();
  gpsError = null;

  const spd = toKmh(c.speed);
  if(spd>0){spdSum+=spd;spdCount++;}
  if(spd>maxSpd) maxSpd=spd;

  speedHistory.push(spd);
  if(speedHistory.length>HIST) speedHistory.shift();
  altHistory.push(c.altitude||0);
  if(altHistory.length>HIST) altHistory.shift();

  if(c.heading!=null) smoothHeading=shortRot(smoothHeading,c.heading);
  render();
}

function resetData(){
  gps=null;speedHistory=[];altHistory=[];maxSpd=0;spdSum=0;spdCount=0;smoothHeading=0;lastUpdate=null;
}

function startLiveGps(){
  if(!navigator.geolocation){gpsError='Geolocation nicht unterstützt.';render();return;}
  gpsAttempted = true;
  watchId = navigator.geolocation.watchPosition(
    pos => { gpsPermissionDenied=false; processPosition(pos.coords); },
    err => {
      if(err.code===1){gpsPermissionDenied=true;gpsError='Standortzugriff verweigert.';}
      else if(err.code===2) gpsError='GPS-Signal nicht verfügbar.';
      else gpsError='Position konnte nicht ermittelt werden.';
      render();
    },
    {enableHighAccuracy:true,maximumAge:1000,timeout:10000}
  );
}

function stopLiveGps(){
  if(watchId!=null){navigator.geolocation.clearWatch(watchId);watchId=null;}
}

function startDemo(){
  demoTime = 0;
  demoInterval = setInterval(()=>{
    demoTime++;
    processPosition(getDemoGps(demoTime));
  }, 1000);
  // Fire immediately
  processPosition(getDemoGps(0));
}

function stopDemo(){
  if(demoInterval){clearInterval(demoInterval);demoInterval=null;}
}

window.switchMode = function(m){
  if(m===mode) return;
  stopLiveGps();
  stopDemo();
  resetData();
  mode = m;
  if(m==='live') startLiveGps();
  else startDemo();
  render();
};

window.retryGps = function(){
  gpsPermissionDenied = false;
  gpsError = null;
  stopLiveGps();
  resetData();
  startLiveGps();
  render();
};

// ── Init ──
render();
startLiveGps();

// Auto-switch to demo if no GPS after 5 seconds
setTimeout(()=>{
  if(!gps && mode==='live'){
    // Don't auto-switch, but make the hint more visible
    render();
  }
}, 5000);

</script>
</body>
</html>
