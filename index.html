<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TW Navigator - Luxury Maritime Bridge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed-variant": "#574500",
                        "on-primary-fixed-variant": "#004f58",
                        "tertiary-fixed-dim": "#00daf3",
                        "on-background": "#dde2f6",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "primary": "#00daf3",
                        "on-secondary-fixed": "#241a00",
                        "surface-variant": "#2f3444",
                        "tertiary-fixed": "#9cf0ff",
                        "surface-container-lowest": "#080e1c",
                        "surface-bright": "#333949",
                        "surface": "#0d1321",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#2f3444",
                        "on-tertiary-fixed-variant": "#004f58",
                        "primary-fixed": "#9cf0ff",
                        "on-primary-fixed": "#001f24",
                        "surface-dim": "#0d1321",
                        "on-secondary-container": "#342800",
                        "outline-variant": "#45464c",
                        "primary-container": "#000d0f",
                        "tertiary-container": "#000d10",
                        "secondary": "#e9c349",
                        "on-primary-container": "#008696",
                        "surface-container-high": "#242a39",
                        "on-primary": "#00363d",
                        "surface-container-low": "#161b2a",
                        "surface-container": "#1a1f2e",
                        "on-secondary": "#3c2f00",
                        "secondary-fixed-dim": "#e9c349",
                        "tertiary": "#00daf3",
                        "inverse-surface": "#dde2f6",
                        "outline": "#909096",
                        "on-tertiary-fixed": "#001f24",
                        "on-tertiary": "#00363d",
                        "on-surface": "#dde2f6",
                        "secondary-fixed": "#ffe088",
                        "secondary-container": "#af8d11",
                        "on-surface-variant": "#c6c6cc",
                        "error-container": "#93000a",
                        "background": "#0d1321",
                        "inverse-primary": "#006875",
                        "inverse-on-surface": "#2b3040",
                        "primary-fixed-dim": "#00daf3",
                        "surface-tint": "#00daf3",
                        "on-tertiary-container": "#008696"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"],
                        "mono": ["JetBrains Mono"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(8, 14, 28, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 218, 243, 0.2);
        }
        .speed-glow {
            text-shadow: 0 0 20px rgba(0, 218, 243, 0.5);
        }
        body {
            background-color: #080e1c;
            color: #dde2f6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }
    </style>
</head>
<body class="min-h-screen">
<!-- Full-Screen Map Background -->
<div class="map-container">
<img class="w-full h-full object-cover grayscale brightness-[0.4] contrast-125" data-alt="top-down nautical navigation map with blue ocean tones and digital grid overlay in a dark maritime aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqYybD8U1RFPTt44suGr6tvtuIXZqHkxnO1LJNY48Ubv3Hd2lTSCeCsWrD92Up7-_qhfMFifCO9VtOYMwrOmOBMOIiIbnWTH2q7tp_-L2zR0OeZIHj4YrHCOCwIM4waj28QtDWpMjhl1T82lnIvCCTm-rHM_3rJ1KJHKYEwoXKPWBNQo8irbRbXIL5uIlq91IdLvmwQkkHs57wPol5d9cl8llkT9YimSkZmqzJyWVuCVFU5MObVYa6T6sxypchH-IvW-UbfwxRcPC3"/>
<!-- Radar/Compass Decorative Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-20 bg-[radial-gradient(circle,transparent_20%,rgba(0,218,243,0.05)_100%)]"></div>
</div>
<!-- TopAppBar (Floating) -->
<header class="bg-[#0d1321]/40 backdrop-blur-md border-b border-cyan-400/10 flex justify-between items-center px-6 h-16 w-full fixed top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-cyan-400" data-icon="explore">explore</span>
<h1 class="font-['Space_Grotesk'] tracking-widest uppercase text-xl font-bold text-cyan-400">TW NAVIGATOR</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-cyan-400/10 px-3 py-1 rounded-full border border-cyan-400/20">
<span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
<span class="text-[10px] font-mono text-cyan-400 font-bold uppercase tracking-widest">Active</span>
</div>
<button class="text-slate-400 hover:bg-cyan-400/10 transition-colors p-2 rounded-lg">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Floating Overlay Content -->
<main class="relative z-10 pt-20 px-4 h-screen flex flex-col pointer-events-none">
<!-- Instrument Overlay (Top) -->
<div class="flex gap-2 w-full max-w-lg mx-auto pointer-events-auto">
<!-- Velocity -->
<div class="flex-1 glass-panel px-3 py-3 rounded-xl flex flex-col items-center border-t-2 border-t-primary">
<span class="text-[8px] font-mono text-cyan-100/70 uppercase tracking-widest font-bold">Velocity</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-primary speed-glow">24.8</span>
<span class="text-[10px] font-headline text-cyan-100/50">kn</span>
</div>
</div>
<!-- Heading -->
<div class="flex-1 glass-panel px-3 py-3 rounded-xl flex flex-col items-center border-t-2 border-t-white">
<span class="text-[8px] font-mono text-cyan-100/70 uppercase tracking-widest font-bold">Heading</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-white">312°</span>
<span class="text-[10px] font-headline text-secondary font-bold">NW</span>
</div>
</div>
<!-- Altitude -->
<div class="flex-1 glass-panel px-3 py-3 rounded-xl flex flex-col items-center border-t-2 border-t-cyan-400/40">
<span class="text-[8px] font-mono text-cyan-100/70 uppercase tracking-widest font-bold">Altitude</span>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold text-white">142</span>
<span class="text-[10px] font-mono text-cyan-100/50">m</span>
</div>
</div>
</div>
<!-- Middle-Bottom Floaters -->
<div class="mt-auto mb-28 w-full max-w-lg mx-auto space-y-3 pointer-events-auto">
<!-- Position & Odometer Row (Floating Cards) -->
<div class="flex gap-3">
<!-- Current Position (Condensed) -->
<div class="glass-panel p-3 rounded-xl flex-1">
<div class="text-[9px] font-mono text-primary uppercase mb-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="location_on">location_on</span>
                    Position
                </div>
<div class="flex flex-col">
<span class="text-[10px] font-mono text-white">51° 30' 26" N</span>
<span class="text-[10px] font-mono text-white">0° 7' 39" W</span>
</div>
</div>
<!-- Odometer (Condensed) -->
<div class="glass-panel p-3 rounded-xl flex-1 border-r-2 border-secondary">
<div class="text-[9px] font-mono text-on-surface-variant uppercase mb-1">Odometer</div>
<div class="flex items-baseline gap-1">
<span class="text-lg font-headline font-bold text-on-surface">1,284.5</span>
<span class="text-[9px] font-mono text-on-surface-variant uppercase">nm</span>
</div>
</div>
</div>
<!-- Mini Recording Tooltip / Action -->
<div class="flex justify-between items-center bg-secondary/10 backdrop-blur-md border border-secondary/30 p-2 px-4 rounded-full">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse"></span>
<span class="text-[10px] font-mono text-secondary font-bold uppercase tracking-wider">Log Active</span>
</div>
<div class="text-[10px] font-mono text-white/60">2,378.9 km Total</div>
</div>
</div>
<!-- Center Aim (Floating) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-40">
<div class="w-12 h-12 border border-cyan-400/30 rounded-full flex items-center justify-center">
<div class="w-1 h-1 bg-cyan-400 rounded-full"></div>
</div>
</div>
<!-- Location Recenter Button (Floating Bottom Right) -->
<div class="absolute bottom-28 right-4 pointer-events-auto">
<button class="bg-primary p-3 rounded-full shadow-[0_0_20px_rgba(0,218,243,0.4)] transition-transform active:scale-90">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="my_location">my_location</span>
</button>
</div>
</main>
<!-- BottomNavBar (Floating) -->
<nav class="bg-[#0d1321]/80 backdrop-blur-xl fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 z-50 border-t border-cyan-400/15 shadow-[0_-20px_40px_rgba(0,0,0,0.6)]">
<!-- Cockpit Tab (Active) -->
<a class="flex flex-col items-center justify-center text-cyan-400 bg-cyan-400/10 rounded-2xl px-6 py-2 border-t-2 border-cyan-400 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="speed">speed</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Cockpit</span>
</a>
<!-- Map Tab -->
<a class="flex flex-col items-center justify-center text-slate-500 py-2 opacity-60 hover:text-cyan-300 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="map">map</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Map</span>
</a>
<!-- Recording Tab -->
<a class="flex flex-col items-center justify-center text-slate-500 py-2 opacity-60 hover:text-cyan-300 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold tracking-widest mt-1">Journal</span>
</a>
</nav>
</body></html>
